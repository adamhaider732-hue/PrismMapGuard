# ============================================
# PrismMapGuard Configuration
# Content moderation for ImageFrame map art
# ============================================

# ---- SIGHTENGINE API ----
# Sign up free at https://sightengine.com
# Free tier: 2,000 scans/month (500/day)
sightengine:
  enabled: true
  api-user: "YOUR_API_USER"
  api-secret: "YOUR_API_SECRET"

# ---- MODERATION THRESHOLDS ----
# Scores range from 0.0 to 1.0 (higher = more likely to contain)
# Lower threshold = stricter moderation
thresholds:
  # Sexual content
  sexual-activity: 0.4
  sexual-display: 0.4
  erotica: 0.5

  # Hate symbols (strict)
  nazi: 0.3
  supremacist: 0.3
  confederate: 0.4
  isis: 0.3

  # Violence & gore
  gore: 0.5
  weapon: 0.7

  # Offensive gestures
  middle-finger: 0.5

  # Drugs
  recreational-drug: 0.7

# ---- AUTO-BAN ----
# Ban players from uploading after N rejections in 24 hours
auto-ban:
  enabled: true
  rejections-before-ban: 3

# ---- MESSAGES ----
messages:
  scanning: "&7Scanning your image for prohibited content..."
  approved: "&aImage approved! Creating your map art..."
  rejected: "&cImage rejected: contains prohibited content ({reason}). If you believe this is an error, open a support ticket."
  banned: "&cYou have been banned from uploading images. Contact staff if you believe this is an error."
  api-error: "&cImage scanning temporarily unavailable. Please try again later."
  not-configured: "&cMap art moderation is not configured yet. Please contact an admin."
